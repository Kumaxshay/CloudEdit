<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Code Sync Server</title>
		<title>CloudEdit Server</title>
		<style>
			body {
				margin: 0;
				padding: 0;
				font-family: Arial, sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				background-color: #0f172a;
			}

			.container {
				text-align: center;
			}

			h1 {
				color: #f8fafc;
				font-size: 3em;
				margin-bottom: 20px;
			}

			p {
				color: #94a3b8;
				font-size: 1.2em;
			}

			.logo {
				width: 150px;
				margin-bottom: 20px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>CloudEdit Server</h1>
			<p>
				Welcome to CloudEdit Server. Everything is set up and ready
				to go!
			</p>
			<p class="time">Current Time: <span id="currentTime"></span></p>
		</div>
		<script>
			document.getElementById("currentTime").innerText =
				new Date().toLocaleTimeString()
		</script>
	</body>
</html>
